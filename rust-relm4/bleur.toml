[project]
name = "rust-relm4"

## Variables

[[variable]]
variable = "website"
default = "https://bleur.uz"
message = "Is there any website hosted for this project?"

[[variable]]
variable = "repository"
default = "https://github.com/bleur-org/templates"
message = "What's the link to the repo?"

[[variable]]
variable = "description"
default = "My very awesome rust project"
message = "What's this project about generally?"

[[variable]]
variable = "author"
default = "Bleur Developers"
message = "Who's going to be author?"

# File changes

[[change]]
placeholder = "#website#"
source = "Cargo.toml"
value = "@website@"

[[change]]
placeholder = "#author#"
source = "Cargo.toml"
value = "@author@"

[[change]]
placeholder = "#repository#"
source = "Cargo.toml"
value = "@repository@"

[[change]]
placeholder = "#description#"
source = "Cargo.toml"
value = "@description@"
